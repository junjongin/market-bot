name: Market Bot

on:
  workflow_dispatch:
  schedule:
  - cron: "*/5 * * * *"

concurrency:
  group: market-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Debug trigger
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Install libraries
        run: pip install yfinance requests

      - name: Run script
        run: python market_report.py
